<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Краудинвестинг — Совэлмаш, Аэронова, Web3ECO</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 700px;
      padding: 60px 40px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 28px;
      color: #0d1b4b;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #444;
      margin-bottom: 40px;
    }

    button {
      background: #28a745;
      color: #fff;
      border: none;
      padding: 16px 48px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #218838;
    }

    button:active {
      transform: scale(0.97);
    }

    /* Модальное окно */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .overlay.active {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
    }

    .modal p {
      font-size: 1.2rem;
      font-weight: 500;
      color: #0d1b4b;
      margin-bottom: 28px;
    }

    .modal-close {
      background: #0d1b4b;
      color: #fff;
      border: none;
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .modal-close:hover {
      background: #1a2f6e;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Краудинвестинг — Совэлмаш, Аэронова, Web3ECO</h1>
    <p>
      Инвестиционная платформа для участия в перспективных проектах реального сектора и Web3-экономики.
      Мы объединяем частных инвесторов и инновационные компании для совместного роста.
    </p>
    <button onclick="document.getElementById('overlay').classList.add('active')">
      Узнать больше
    </button>
  </div>

  <div class="overlay" id="overlay" onclick="this.classList.remove('active')">
    <div class="modal" onclick="event.stopPropagation()">
      <p>Скоро здесь будет полная платформа</p>
      <button class="modal-close" onclick="document.getElementById('overlay').classList.remove('active')">
        Закрыть
      </button>
    </div>
  </div>

</body>
</html>
